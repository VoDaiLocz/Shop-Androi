# Render Blueprint – Infrastructure as Code
# Docs: https://docs.render.com/blueprint-spec
#
# Sau khi push file này lên master, vào Render Dashboard:
#   New → Blueprint → chọn repo → Render sẽ đọc file này tự động.

databases:
  - name: shop-db
    databaseName: shop_api
    user: shop_user
    region: singapore
    plan: free
    ipAllowList: []          # cho phép Render services kết nối

services:
  - type: web
    name: shop-api
    runtime: docker
    dockerfilePath: backend/ShopApi/Dockerfile
    dockerContext: backend/ShopApi
    region: singapore       # gần VN nhất
    plan: free
    branch: master
    healthCheckPath: /api/products
    envVars:
      # ── Database (PostgreSQL trên Render, tự link từ shop-db) ──
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: shop-db
          property: connectionString
      # ── JWT ──
      - key: Jwt__Key
        generateValue: true  # Render tự sinh random 256-bit
      - key: Jwt__Issuer
        value: ShopApi
      - key: Jwt__Audience
        value: ShopAndroid
      # ── Admin seed ──
      - key: AdminSeed__Email
        value: admin@shop.local
      - key: AdminSeed__Username
        value: Admin
      - key: AdminSeed__Password
        value: "ShopAdmin@2026!"
      # ── SePay webhook ──
      - key: Sepay__WebhookApiKey
        value: "Vodailoc1428"
      - key: Sepay__BankCode
        value: "BIDV"
      - key: Sepay__AccountNumber
        value: "8894308684"
      - key: Sepay__QrTemplate
        value: compact2
      # ── Google OAuth ──
      - key: Google__ClientId
        value: "826757086511-es3htk7un7lq7lvlpmkqppmp3h7nnjd2.apps.googleusercontent.com"
