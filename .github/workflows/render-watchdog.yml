name: Render Watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      url:
        description: "Optional URL to ping"
        required: false
        type: string
        default: "https://shop-api-xttf.onrender.com/api/products"

permissions:
  contents: read

concurrency:
  group: render-watchdog
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      WATCHDOG_URL: ${{ github.event.inputs.url || secrets.WATCHDOG_URL }}
    steps:
      - name: Validate watchdog URL
        shell: bash
        run: |
          if [ -z "$WATCHDOG_URL" ]; then
            echo "Set the WATCHDOG_URL repository secret or provide the manual workflow input."
            exit 1
          fi

          case "$WATCHDOG_URL" in
            http://*|https://*) ;;
            *)
              echo "WATCHDOG_URL must start with http:// or https://."
              exit 1
              ;;
          esac

      - name: Ping backend
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            "$WATCHDOG_URL"
